name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run default Rust tests
        run: cargo test --workspace
      - name: Run all-feature Rust tests
        run: cargo test --workspace --all-features

  python:
    name: Python tests and documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build test wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist -i python3.12
          manylinux: auto
      - name: Install wheel and test dependencies
        run: python -m pip install pytest -r docs/requirements.txt dist/*.whl
      - name: Run Python tests
        run: python -m pytest -q
      - name: Build documentation
        run: python -m sphinx -W --keep-going -b html docs docs/_build/html
